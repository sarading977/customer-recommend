<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBI 客户增购推荐工具</title>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d2e;--card:#222640;--border:#2d3154;
  --text:#e4e4e7;--muted:#9ca3af;--accent:#4f8ff7;
  --plan-a:#7C3AED;--plan-b:#0096FF;--plan-c:#00B374;
  --red:#ef4444;--orange:#f59e0b;--green:#22c55e;
}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
a{color:var(--accent);text-decoration:none}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:340px;min-width:340px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;padding:24px 32px}

/* Sidebar Header */
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:4px}
.sidebar-header .sub{font-size:11px;color:var(--muted)}
.search-box{margin-top:12px;position:relative}
.search-box input{width:100%;padding:10px 12px 10px 36px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box .icon{position:absolute;left:11px;top:11px;color:var(--muted);font-size:14px}

/* Filters */
.filters{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px}
.filter-btn{padding:4px 10px;font-size:11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,143,247,.1)}
.filter-btn.plan-a.active{border-color:var(--plan-a);color:var(--plan-a);background:rgba(124,58,237,.1)}
.filter-btn.plan-b.active{border-color:var(--plan-b);color:var(--plan-b);background:rgba(0,150,255,.1)}
.filter-btn.plan-c.active{border-color:var(--plan-c);color:var(--plan-c);background:rgba(0,179,116,.1)}

/* Customer List */
.customer-list{flex:1;overflow-y:auto;padding:8px}
.customer-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;display:flex;align-items:center;gap:10px}
.customer-item:hover{background:var(--card)}
.customer-item.selected{background:var(--card);border-left:3px solid var(--accent)}
.customer-item .plan-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.customer-item .plan-dot.A{background:var(--plan-a)}
.customer-item .plan-dot.B{background:var(--plan-b)}
.customer-item .plan-dot.C{background:var(--plan-c)}
.customer-item .info{flex:1;min-width:0}
.customer-item .name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.customer-item .meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.customer-item .tag{font-size:9px;padding:1px 6px;border-radius:10px;flex-shrink:0;font-weight:600}
.tag-A{background:rgba(124,58,237,.15);color:var(--plan-a)}
.tag-B{background:rgba(0,150,255,.15);color:var(--plan-b)}
.tag-C{background:rgba(0,179,116,.15);color:var(--plan-c)}
.list-count{padding:8px 16px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}

/* Main: Empty State */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:14px}

/* Main: Customer Detail */
.detail{max-width:900px}
.profile-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
.profile-header .plan-badge{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.plan-badge-A{background:var(--plan-a)}
.plan-badge-B{background:var(--plan-b)}
.plan-badge-C{background:var(--plan-c)}
.profile-header .title{flex:1}
.profile-header .title h2{font-size:20px;font-weight:700;margin-bottom:4px}
.profile-header .title .sub-info{font-size:12px;color:var(--muted)}

/* Metric Pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.pill{padding:8px 14px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:12px}
.pill .label{color:var(--muted);font-size:10px;margin-bottom:2px}
.pill .value{font-weight:600}
.pill .value.green{color:var(--green)}
.pill .value.red{color:var(--red)}
.pill .value.orange{color:var(--orange)}

/* Sections */
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.section h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section h3 .dot{width:10px;height:10px;border-radius:50%}

/* Score Bars */
.score-row{display:flex;align-items:center;margin-bottom:8px}
.score-label{width:80px;font-size:11px;color:var(--muted)}
.score-bar-wrap{flex:1;height:18px;background:var(--card);border-radius:9px;overflow:hidden;margin:0 10px}
.score-bar{height:100%;border-radius:9px;transition:width .5s ease}
.score-val{width:36px;font-size:12px;font-weight:600;text-align:right}

/* Module PV */
.mod-row{display:flex;align-items:center;margin-bottom:6px}
.mod-name{width:72px;font-size:11px;color:var(--muted);text-align:right;padding-right:10px}
.mod-bar-wrap{flex:1;height:20px;background:var(--card);border-radius:4px;overflow:hidden;position:relative}
.mod-bar{height:100%;border-radius:4px;transition:width .5s ease;min-width:2px}
.mod-val{width:70px;font-size:11px;text-align:right;padding-left:8px;color:var(--muted)}

/* Plan Recommendation */
.plan-card{border-left:4px solid var(--accent);padding-left:16px}
.plan-card.A{border-color:var(--plan-a)}
.plan-card.B{border-color:var(--plan-b)}
.plan-card.C{border-color:var(--plan-c)}
.plan-reason{font-size:13px;line-height:1.7;margin-bottom:16px;color:var(--text)}
.talking-points{list-style:none;counter-reset:tp}
.talking-points li{counter-increment:tp;padding:10px 12px;margin-bottom:6px;background:var(--card);border-radius:8px;font-size:12px;line-height:1.7;position:relative;padding-left:36px}
.talking-points li::before{content:counter(tp);position:absolute;left:10px;top:10px;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.plan-card.A .talking-points li::before{background:var(--plan-a)}
.plan-card.B .talking-points li::before{background:var(--plan-b)}
.plan-card.C .talking-points li::before{background:var(--plan-c)}

/* Copy Button */
.copy-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;transition:opacity .2s;margin-top:8px}
.copy-btn:hover{opacity:.85}
.copy-btn.copied{background:var(--green)}

/* XiaoQ Status */
.xq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.xq-item{padding:10px;background:var(--card);border-radius:8px}
.xq-item .lbl{font-size:10px;color:var(--muted);margin-bottom:4px}
.xq-item .val{font-size:13px;font-weight:600}

/* Financial */
.fin-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:12px}
.fin-label{width:100px;color:var(--muted)}
.fin-value{font-weight:600;flex:1}
.fin-gap{font-size:11px;color:var(--muted)}

/* Slide Deck */
.slide-deck{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.slide-deck-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.slide-deck-header h3{font-size:14px;font-weight:700;margin-bottom:0;display:flex;align-items:center;gap:8px}
.ppt-dl-btn{padding:6px 14px;font-size:11px;font-weight:600;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.ppt-dl-btn:hover{border-color:var(--sl-accent,var(--accent));color:var(--sl-accent,var(--accent));background:rgba(79,143,247,.08)}
.ppt-dl-btn.generating{opacity:.6;cursor:wait}
.ppt-dl-btn.done{border-color:var(--green);color:var(--green)}
.slide-viewport{border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;background:var(--card);min-height:300px}
.slide-viewport .sl-accent-bar{height:4px;width:100%}
.sl-inner{padding:24px}
.sl-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.sl-subtitle{font-size:11px;color:var(--muted);margin-bottom:16px}
.sl-grid{display:grid;gap:10px}
.sl-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.sl-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.sl-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.sl-grid.cols-5{grid-template-columns:repeat(5,1fr)}
.sl-card-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative}
.sl-card-item .sl-card-bar{height:3px;border-radius:3px 3px 0 0;margin:-12px -12px 10px -12px}
.sl-card-item .sl-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:9px;font-weight:700;color:#fff;margin-bottom:6px}
.sl-card-item .sl-card-title{font-size:12px;font-weight:700;margin-bottom:4px}
.sl-card-item .sl-card-desc{font-size:10px;color:var(--muted);line-height:1.6;white-space:pre-line}
.sl-card-item .sl-card-result{margin-top:8px;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;color:#fff;text-align:center}
.sl-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px}
.sl-table th{padding:8px 10px;color:#fff;font-weight:600;text-align:left}
.sl-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.sl-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.sl-callout{padding:10px 14px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;line-height:1.6;margin-top:12px}
.sl-callout .sl-callout-sub{font-weight:400;font-size:11px;opacity:.8;margin-top:2px}
.sl-metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sl-metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.sl-metric .sl-metric-bar{height:3px;border-radius:3px 3px 0 0;margin:-10px -10px 8px -10px}
.sl-metric .sl-metric-name{font-size:11px;font-weight:600;margin-bottom:6px}
.sl-metric .sl-metric-vals{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px}
.sl-metric .sl-bef{font-size:14px;font-weight:700;color:var(--red)}
.sl-metric .sl-arr{font-size:10px;color:var(--muted)}
.sl-metric .sl-aft{font-size:14px;font-weight:700;color:var(--green)}
.sl-metric .sl-metric-tag{background:rgba(34,197,94,.1);color:var(--green);font-size:9px;padding:3px 8px;border-radius:6px;font-weight:600}
.sl-vals-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sl-val-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.sl-val-card .sl-val-title{font-size:12px;font-weight:700;margin-bottom:4px}
.sl-val-card .sl-val-sub{font-size:10px;font-weight:600;color:var(--text);margin-bottom:4px}
.sl-val-card .sl-val-desc{font-size:9px;color:var(--muted);line-height:1.6;white-space:pre-line}
.sl-ba{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sl-ba-box{border-radius:8px;padding:12px}
.sl-ba-box.before{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2)}
.sl-ba-box.after{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2)}
.sl-ba-box .sl-ba-title{font-size:12px;font-weight:700;margin-bottom:8px}
.sl-ba-box .sl-ba-item{font-size:10px;color:var(--muted);margin-bottom:4px;line-height:1.5}
.sl-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sl-step{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.sl-step .sl-step-num{font-size:16px;font-weight:800;margin-bottom:2px}
.sl-step .sl-step-name{font-size:11px;font-weight:600;margin-bottom:4px}
.sl-step .sl-step-desc{font-size:9px;color:var(--muted);line-height:1.5;white-space:pre-line}
.sl-pkgs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.sl-pkg{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative}
.sl-pkg.recommended{border-width:2px}
.sl-pkg .sl-pkg-bar{height:3px;border-radius:3px 3px 0 0;margin:-12px -12px 10px -12px}
.sl-pkg .sl-rec-badge{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;color:#fff;background:var(--orange)}
.sl-pkg .sl-pkg-name{font-size:13px;font-weight:700;margin-bottom:4px}
.sl-pkg .sl-pkg-inc{font-size:10px;font-weight:600;margin-bottom:6px}
.sl-pkg .sl-pkg-desc{font-size:9px;color:var(--muted);line-height:1.6;white-space:pre-line;margin-bottom:8px}
.sl-pkg .sl-pkg-val{background:rgba(34,197,94,.1);color:var(--green);font-size:9px;padding:4px 8px;border-radius:6px;font-weight:600;text-align:center}
.sl-cases{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sl-case{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sl-case .sl-case-tag{padding:8px 12px;color:#fff;font-size:11px;font-weight:700;text-align:center}
.sl-case .sl-case-body{padding:12px}
.sl-case .sl-case-label{font-size:10px;font-weight:600;margin-bottom:2px}
.sl-case .sl-case-text{font-size:9px;color:var(--muted);line-height:1.6;margin-bottom:8px;white-space:pre-line}
.sl-case .sl-case-result{background:rgba(34,197,94,.08);border-radius:6px;padding:8px;font-size:9px;color:var(--green);line-height:1.6;white-space:pre-line}
.sl-diag-intro{padding:12px;border-radius:8px;margin-bottom:12px;font-size:11px;line-height:1.7}
.sl-diag-intro .sl-diag-head{font-weight:700;font-size:12px;margin-bottom:4px}
.sl-stages-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.sl-stage{border-radius:8px;padding:12px;background:var(--surface);border:1px solid var(--border);text-align:center;transition:border .2s}
.sl-stage.highlight{border-width:2px}
.sl-stage .sl-stage-bar{height:3px;border-radius:3px 3px 0 0;margin:-12px -12px 10px -12px}
.sl-stage .sl-stage-name{font-size:13px;font-weight:700;margin-bottom:2px}
.sl-stage .sl-stage-year{font-size:10px;color:var(--muted);margin-bottom:6px}
.sl-stage .sl-stage-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:9px;font-weight:600;color:#fff;margin-bottom:8px}
.sl-stage .sl-stage-sec{font-size:10px;font-weight:600;margin-bottom:2px}
.sl-stage .sl-stage-desc{font-size:9px;color:var(--muted);line-height:1.5;white-space:pre-line}
.sl-talk{padding:12px;border-radius:8px;margin-top:12px;font-size:11px;line-height:1.7}
.sl-talk .sl-talk-head{font-weight:700;font-size:12px;margin-bottom:6px}
.sl-talk .sl-talk-sec{font-weight:700;margin-top:6px}
.sl-talk .sl-talk-line{color:var(--text);opacity:.85}

/* Slide Nav */
.slide-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 0 0}
.slide-nav .nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.slide-nav .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.slide-nav .nav-btn:disabled{opacity:.3;cursor:default}
.slide-nav .dots{display:flex;gap:6px}
.slide-nav .dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.slide-nav .dot.active{transform:scale(1.3)}
.slide-nav .counter{font-size:11px;color:var(--muted);min-width:40px;text-align:right}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;min-width:unset;max-height:50vh}
  .app{flex-direction:column}
  .main{padding:16px}
  .sl-grid.cols-4,.sl-grid.cols-5{grid-template-columns:repeat(2,1fr)}
  .sl-metrics-row{grid-template-columns:repeat(2,1fr)}
  .sl-steps{grid-template-columns:repeat(2,1fr)}
  .sl-pkgs{grid-template-columns:1fr}
  .sl-cases{grid-template-columns:1fr}
  .sl-ba{grid-template-columns:1fr}
  .sl-vals-row{grid-template-columns:1fr}
  .sl-stages-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- App -->
<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>QuickBI 客户增购推荐</h1>
      <div class="sub">输入客户名 → 查看使用数据 → 获取推荐方案</div>
      <div class="search-box">
        <span class="icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="搜索客户名称...">
      </div>
    </div>
    <div class="filters" id="filters"></div>
    <div class="list-count" id="listCount"></div>
    <div class="customer-list" id="customerList"></div>
  </div>
  <!-- Main -->
  <div class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">&#128202;</div>
      <p>从左侧搜索或选择一个客户查看详情</p>
    </div>
    <div class="detail" id="detail" style="display:none"></div>
  </div>
</div>

<script>
// Init - load data on page load
loadData();

// Data
let allData=null, allCustomers=[], selected=null, activeFilters={plan:null,priority:null,health:null};

async function loadData(){
  try{
    const r=await fetch('./data/customers.json');
    allData=await r.json();
    allCustomers=Object.values(allData.customers).sort((a,b)=>(b.scores?.composite||0)-(a.scores?.composite||0));
    buildFilters();
    renderList();
  }catch(e){
    document.getElementById('mainPanel').innerHTML='<div class="empty-state"><p>数据加载失败，请确认 data/customers.json 存在</p></div>';
  }
}

// Filters
function buildFilters(){
  const fc=document.getElementById('filters');
  const plans=[{k:'A',l:'方案A',c:'plan-a'},{k:'B',l:'方案B',c:'plan-b'},{k:'C',l:'方案C',c:'plan-c'}];
  const health=['健康','观测','高危'];
  const priorities=['高优先级','中优先级','低优先级','观察'];
  let html='';
  plans.forEach(p=>{html+=`<button class="filter-btn ${p.c}" data-type="plan" data-val="${p.k}">${p.l}</button>`});
  health.forEach(h=>{html+=`<button class="filter-btn" data-type="health" data-val="${h}">${h}</button>`});
  priorities.forEach(p=>{html+=`<button class="filter-btn" data-type="priority" data-val="${p}">${p}</button>`});
  fc.innerHTML=html;
  fc.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.type,v=btn.dataset.val;
      if(activeFilters[t]===v){activeFilters[t]=null;btn.classList.remove('active')}
      else{
        fc.querySelectorAll(`[data-type="${t}"]`).forEach(b=>b.classList.remove('active'));
        activeFilters[t]=v;btn.classList.add('active');
      }
      renderList();
    });
  });
}

// List
function renderList(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  let filtered=allCustomers.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q))return false;
    if(activeFilters.plan&&c.plan!==activeFilters.plan)return false;
    if(activeFilters.priority&&c.priority!==activeFilters.priority)return false;
    if(activeFilters.health&&c.health!==activeFilters.health)return false;
    return true;
  });
  document.getElementById('listCount').textContent=`${filtered.length} / ${allCustomers.length} 客户`;
  const ul=document.getElementById('customerList');
  ul.innerHTML=filtered.map(c=>`
    <div class="customer-item ${selected===c.name?'selected':''}" data-name="${esc(c.name)}">

// Helpers
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtN(n){
  if(n==null||n===undefined)return'0';
  n=Number(n);
  if(isNaN(n))return'0';
  if(Math.abs(n)>=100000000)return(n/100000000).toFixed(1)+'亿';
  if(Math.abs(n)>=10000)return(n/10000).toFixed(1)+'万';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:0});
}

function renderSlideAt(idx){
  var s=curSlides[idx],el=document.getElementById('slideContent');if(!el||!s)return;

function navSlide(d){curSlideIdx=Math.max(0,Math.min(curSlides.length-1,curSlideIdx+d));renderSlideAt(curSlideIdx)}
function goSlide(i){curSlideIdx=i;renderSlideAt(i)}
function renderSlide(s,c){switch(s.type){case 'stages':return rStages(s);case 'diagnosis':return rDiagnosis(s,c);case 'cardGrid':return rCardGrid(s);case 'painTable':return rPainTable(s);case 'beforeAfter':return rBeforeAfter(s);case 'metrics':return rMetrics(s);case 'landing':return rLanding(s);case 'cases':return rCases(s);default:return '';}}
function rStages(s){var sc=['#6B7280','#0056D2','#7C3AED'];return '<div class="sl-title">'+esc(s.title)+'</div><div class="sl-stages-row">'+s.stages.map(function(st,i){var hl=i+1===s.highlightStage,co=hl?curAccent:sc[i];return '<div class="sl-stage'+(hl?' highlight':'')+'" style="border-color:'+co+'"><div class="sl-stage-bar" style="background:'+co+'"></div><div class="sl-stage-name" style="color:'+co+'">'+esc(st.name)+'</div><div class="sl-stage-year">'+st.year+'</div><div class="sl-stage-badge" style="background:'+co+'">'+esc(st.status)+'</div><div class="sl-stage-sec" style="color:'+co+'">核心特征</div><div class="sl-stage-desc">'+esc(st.feature)+'</div><div class="sl-stage-sec" style="color:'+co+';margin-top:8px">核心焦点</div><div class="sl-stage-desc">'+esc(st.focus)+'</div></div>';}).join('')+'</div><div class="sl-callout" style="background:'+curAccent+'10;color:var(--text);border:1px solid '+curAccent+'40"><div>'+esc(s.insight)+'</div><div class="sl-callout-sub">'+esc(s.cta)+'</div></div>';}
function rDiagnosis(s,c){var lines=typeof s.dynamicIntro==='function'?s.dynamicIntro(c):[];return '<div class="sl-title">'+esc(s.title)+'</div><div class="sl-diag-intro" style="background:'+curAccent+'10;border:1px solid '+curAccent+'40"><div class="sl-diag-head" style="color:'+curAccent+'">基于贵司（'+esc(c.name)+'）的实际使用数据</div>'+lines.map(function(l){return '<div>'+esc(l)+'</div>'}).join('')+'</div><div class="sl-grid cols-4">'+s.cards.map(function(cd){return '<div class="sl-card-item"><div class="sl-card-bar" style="background:'+cd.color+'"></div><div><span class="sl-badge" style="background:'+cd.color+'">'+esc(cd.badge)+'</span></div><div class="sl-card-title" style="color:'+cd.color+'">'+esc(cd.title)+'</div><div class="sl-card-desc">'+esc(cd.desc)+'</div></div>'}).join('')+'</div><div class="sl-callout" style="background:'+curAccent+'"><div>'+esc(s.conclusion)+'</div><div class="sl-callout-sub">'+esc(s.conclusionSub)+'</div></div>';}
function rCardGrid(s){var h='<div class="sl-title">'+esc(s.title)+'</div>';if(s.subtitle)h+='<div class="sl-subtitle">'+esc(s.subtitle)+'</div>';h+='<div class="sl-grid cols-'+(s.columns||3)+'">'+s.cards.map(function(cd){var inner='<div class="sl-card-bar" style="background:'+(cd.resultColor||cd.color||curAccent)+'"></div>';if(cd.badge)inner+='<div><span class="sl-badge" style="background:'+(cd.badgeColor||cd.resultColor||curAccent)+'">'+esc(cd.badge)+'</span></div>';inner+='<div class="sl-card-title" style="color:'+(cd.resultColor||cd.color||curAccent)+'">'+esc(cd.title)+'</div><div class="sl-card-desc">'+esc(cd.desc)+'</div>';if(cd.scenario)inner+='<div style="margin-top:6px;padding:6px;background:var(--bg);border-radius:4px;font-size:9px;color:var(--muted)">'+esc(cd.scenario)+'</div>';if(cd.result)inner+='<div class="sl-card-result" style="background:'+(cd.resultColor||curAccent)+'">'+esc(cd.result)+'</div>';return '<div class="sl-card-item">'+inner+'</div>';}).join('')+'</div>';if(s.extraCards)h+='<div class="sl-grid cols-3" style="margin-top:10px">'+s.extraCards.map(function(cd){return '<div class="sl-card-item"><div class="sl-card-bar" style="background:'+(cd.color||curAccent)+'"></div><div class="sl-card-title" style="color:'+(cd.color||curAccent)+'">'+esc(cd.title)+'</div><div class="sl-card-desc">'+esc(cd.desc)+'</div></div>'}).join('')+'</div>';if(s.footer)h+='<div class="sl-callout" style="background:'+curAccent+'">'+esc(s.footer)+'</div>';if(s.footnotes)s.footnotes.forEach(function(f){h+='<div style="font-size:10px;color:'+curAccent+';font-weight:600;margin-top:4px">'+esc(f)+'</div>'});if(s.talkScript)h+=renderTalkScript(s.talkScript);return h;}

function rBeforeAfter(s){return '<div class="sl-title">'+esc(s.title)+'</div><div class="sl-subtitle">'+esc(s.subtitle)+'</div><div class="sl-ba"><div class="sl-ba-box before"><div class="sl-ba-title" style="color:var(--red)">'+esc(s.before.title)+'</div>'+s.before.items.map(function(i){return '<div class="sl-ba-item">x &nbsp;'+esc(i)+'</div>'}).join('')+'</div><div class="sl-ba-box after"><div class="sl-ba-title" style="color:var(--green)">'+esc(s.after.title)+'</div>'+s.after.items.map(function(i){return '<div class="sl-ba-item">&#10003; &nbsp;'+esc(i)+'</div>'}).join('')+'</div></div><div class="sl-grid cols-3">'+s.capabilities.map(function(cap){return '<div class="sl-card-item"><div class="sl-card-bar" style="background:'+cap.color+'"></div><div class="sl-card-title" style="color:'+cap.color+'">'+esc(cap.title)+'</div><div class="sl-card-desc">'+esc(cap.desc)+'</div></div>'}).join('')+'</div><div class="sl-callout" style="background:'+curAccent+'">核心卖点：零迁移成本——现有报表不用改，开通解读能力后每张报表自动拥有AI分析师</div>';}

// ── PPT Generation Module (PptxGenJS) ─────────────────────
var PPT={BG:'0F1117',SF:'1A1D2E',CD:'222640',BD:'2D3154',TX:'E4E4E7',MT:'9CA3AF',
  RD:'EF4444',OG:'F59E0B',GN:'22C55E',W:13.33,H:7.5,ML:0.5,MR:0.5,MT2:0.4,
  FT:'Microsoft YaHei',PLAN_NAMES:{A:'AI\u6570\u5b57\u5458\u5de5',B:'AI\u57fa\u7840\u63d0\u6548',C:'\u6df1\u5ea6\u573a\u666f\u52a0\u901f'}};
PPT.CW=PPT.W-PPT.ML-PPT.MR;

function pptHex(c){
  if(!c)return PPT.TX;
  if(c.indexOf('var(')===0){var m={'var(--green)':PPT.GN,'var(--red)':PPT.RD,'var(--orange)':PPT.OG,'var(--plan-a)':'7C3AED','var(--plan-b)':'0096FF','var(--plan-c)':'00B374','var(--accent)':'4F8FF7','var(--muted)':PPT.MT,'var(--text)':PPT.TX};return m[c]||PPT.TX;}
  return c.replace('#','');
}
function pptNL(s){return s?s.replace(/\\n/g,'\n'):''}
function pptTitle(sl,t,ac){
  sl.addShape('rect',{x:0,y:0,w:PPT.W,h:0.06,fill:{color:ac}});
  sl.addText(t,{x:PPT.ML,y:PPT.MT2,w:PPT.CW,h:0.45,fontSize:18,fontFace:PPT.FT,bold:true,color:PPT.TX});
}
function pptSubtitle(sl,t,y){
  sl.addText(t,{x:PPT.ML,y:y||0.85,w:PPT.CW,h:0.3,fontSize:11,fontFace:PPT.FT,color:PPT.MT});
}
function pptCardBox(sl,x,y,w,h,barColor){
  sl.addShape('roundRect',{x:x,y:y,w:w,h:h,rectRadius:0.08,fill:{color:PPT.CD}});
  sl.addShape('rect',{x:x,y:y,w:w,h:0.05,fill:{color:barColor||PPT.TX}});
}
function pptCallout(sl,text,ac,y,w,isSolid){
  var x=PPT.ML;w=w||PPT.CW;
  sl.addShape('roundRect',{x:x,y:y,w:w,h:0.55,rectRadius:0.06,fill:{color:isSolid?ac:PPT.SF},line:isSolid?undefined:{color:ac,width:1}});
  sl.addText(text,{x:x+0.15,y:y+0.05,w:w-0.3,h:0.45,fontSize:10,fontFace:PPT.FT,bold:true,color:isSolid?'FFFFFF':PPT.TX,valign:'middle'});
}
function pptTalk(sl,ts,ac,y){
  var h=0.3+ts.sections.length*0.5;
  sl.addShape('roundRect',{x:PPT.ML,y:y,w:PPT.CW,h:h,rectRadius:0.06,fill:{color:PPT.SF},line:{color:ac,width:1}});
  sl.addText('\u5ba2\u6237\u6c9f\u901a\u8bdd\u672f\u53c2\u8003',{x:PPT.ML+0.15,y:y+0.08,w:PPT.CW-0.3,h:0.22,fontSize:10,fontFace:PPT.FT,bold:true,color:ac});
  ts.sections.forEach(function(sec,i){
    var sy=y+0.32+i*0.5;
    sl.addText(sec.label,{x:PPT.ML+0.15,y:sy,w:2,h:0.2,fontSize:9,fontFace:PPT.FT,bold:true,color:ac});
    sl.addText(sec.line,{x:PPT.ML+0.15,y:sy+0.18,w:PPT.CW-0.4,h:0.28,fontSize:9,fontFace:PPT.FT,color:PPT.MT,italic:true});
  });
  return y+h;
}

// ── Slide Type Renderers ───────────────────────────────────
function pptStages(pptx,s,c,plan){

function pptDiagnosis(pptx,s,c,plan){
  var sl=pptx.addSlide();sl.background={color:PPT.BG};var ac=pptHex(plan.accent);
  pptTitle(sl,s.title,ac);
  var lines=typeof s.dynamicIntro==='function'?s.dynamicIntro(c):[];
  var introH=0.3+lines.length*0.25;
  sl.addShape('roundRect',{x:PPT.ML,y:1.0,w:PPT.CW,h:introH,rectRadius:0.06,fill:{color:PPT.SF},line:{color:ac,width:1}});
  sl.addText('\u57fa\u4e8e\u8d35\u53f8\uff08'+c.name+'\uff09\u7684\u5b9e\u9645\u4f7f\u7528\u6570\u636e',{x:PPT.ML+0.15,y:1.05,w:PPT.CW-0.3,h:0.22,fontSize:10,fontFace:PPT.FT,bold:true,color:ac});
  lines.forEach(function(l,i){

  });
  var cy=1.1+introH+0.15,cw=(PPT.CW-0.45)/4,ch=2.6;

    sl.addText(cd.title,{x:x+0.08,y:cy+0.45,w:cw-0.16,h:0.25,fontSize:11,fontFace:PPT.FT,bold:true,color:co});
    sl.addText(pptNL(cd.desc),{x:x+0.08,y:cy+0.75,w:cw-0.16,h:ch-1.0,fontSize:9,fontFace:PPT.FT,color:PPT.MT,lineSpacing:16});
  });
  var coy=cy+ch+0.15;
  sl.addShape('roundRect',{x:PPT.ML,y:coy,w:PPT.CW,h:0.7,rectRadius:0.06,fill:{color:ac}});

  sl.addText(s.conclusionSub,{x:PPT.ML+0.15,y:coy+0.38,w:PPT.CW-0.3,h:0.25,fontSize:9,fontFace:PPT.FT,color:'FFFFFFCC'});

function pptCardGrid(pptx,s,c,plan){
  var sl=pptx.addSlide();sl.background={color:PPT.BG};var ac=pptHex(plan.accent);
  pptTitle(sl,s.title,ac);
  var startY=0.9;
  if(s.subtitle){pptSubtitle(sl,s.subtitle,0.9);startY=1.15;}
  var cols=s.columns||3,gap=0.12,cw=(PPT.CW-(cols-1)*gap)/cols;
  var hasExtra=s.extraCards&&s.extraCards.length,hasFt=s.footer,hasFn=s.footnotes,hasTs=s.talkScript;
  var ch=hasExtra||hasFt||hasTs?2.5:(cols>=5?3.5:3.2);
  s.cards.forEach(function(cd,i){
    var x=PPT.ML+i*(cw+gap),co=pptHex(cd.resultColor||cd.color||plan.accent);
    pptCardBox(sl,x,startY,cw,ch,co);
    var ty=startY+0.12;
    if(cd.badge){
      sl.addShape('roundRect',{x:x+0.08,y:ty,w:0.5,h:0.2,rectRadius:0.04,fill:{color:pptHex(cd.badgeColor||cd.resultColor||plan.accent)}});
      sl.addText(cd.badge,{x:x+0.08,y:ty,w:0.5,h:0.2,fontSize:7,fontFace:PPT.FT,bold:true,color:'FFFFFF',align:'center',valign:'middle'});
      ty+=0.28;
    }
    sl.addText(cd.title,{x:x+0.08,y:ty,w:cw-0.16,h:0.25,fontSize:cols>=5?9:11,fontFace:PPT.FT,bold:true,color:co});
    sl.addText(pptNL(cd.desc),{x:x+0.08,y:ty+0.3,w:cw-0.16,h:ch-1.2,fontSize:cols>=5?7:9,fontFace:PPT.FT,color:PPT.MT,lineSpacing:14});
    if(cd.result){
      sl.addShape('roundRect',{x:x+0.06,y:startY+ch-0.35,w:cw-0.12,h:0.28,rectRadius:0.04,fill:{color:co}});
      sl.addText(cd.result,{x:x+0.06,y:startY+ch-0.35,w:cw-0.12,h:0.28,fontSize:8,fontFace:PPT.FT,bold:true,color:'FFFFFF',align:'center',valign:'middle'});
    }
  });
  var ny=startY+ch+0.12;
  if(hasExtra){
    var ew=(PPT.CW-0.24)/3;
    s.extraCards.forEach(function(cd,i){
      var x=PPT.ML+i*(ew+0.12),co=pptHex(cd.color||plan.accent);
      pptCardBox(sl,x,ny,ew,0.8,co);
      sl.addText(cd.title,{x:x+0.08,y:ny+0.1,w:ew-0.16,h:0.2,fontSize:9,fontFace:PPT.FT,bold:true,color:co});
      sl.addText(pptNL(cd.desc),{x:x+0.08,y:ny+0.32,w:ew-0.16,h:0.4,fontSize:8,fontFace:PPT.FT,color:PPT.MT});
    });
    ny+=0.95;
  }
  if(hasFt){pptCallout(sl,s.footer,ac,ny,PPT.CW,true);ny+=0.65;}
  if(hasFn)s.footnotes.forEach(function(f,i){
    sl.addText(f,{x:PPT.ML,y:ny+i*0.2,w:PPT.CW,h:0.18,fontSize:8,fontFace:PPT.FT,bold:true,color:ac});
  });
  if(hasTs)pptTalk(sl,s.talkScript,ac,ny);
}

function pptPainTable(pptx,s,c,plan){
  var sl=pptx.addSlide();sl.background={color:PPT.BG};var ac=pptHex(plan.accent);
  pptTitle(sl,s.title,ac);
  var rows=[];
  rows.push(s.headers.map(function(h){return{text:h,options:{fontSize:10,fontFace:PPT.FT,bold:true,color:'FFFFFF',fill:{color:ac},align:'center',valign:'middle'}};}));
  s.rows.forEach(function(r,ri){
    rows.push(r.map(function(cell,ci){return{text:cell,options:{fontSize:9,fontFace:PPT.FT,color:ci===2?PPT.GN:PPT.TX,bold:ci===2,fill:{color:ri%2===0?PPT.CD:PPT.SF},valign:'middle'}};}));
  });
  sl.addTable(rows,{x:PPT.ML,y:1.0,w:PPT.CW,colW:[4.0,4.5,3.83],rowH:0.4,border:{type:'solid',color:PPT.BD,pt:0.5}});
  if(s.talkScript){var ty=1.0+0.4*(s.rows.length+1)+0.2;pptTalk(sl,s.talkScript,ac,ty);}
}

  var sw=(PPT.CW-0.36)/4,sy=1.15,sh=1.4;

    var x=PPT.ML+i*(sw+0.12),co=pptHex(st.color);

// ── Main Download Entry ────────────────────────────────────
function downloadPPT(customer){
  if(typeof PptxGenJS==='undefined'){alert('PPT\u5e93\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u540e\u91cd\u8bd5');return;}
  var btn=document.getElementById('pptDlBtn');
  if(btn){btn.classList.add('generating');btn.textContent='\u2b07 \u751f\u6210\u4e2d...';}
  try{
    var plan=PLAN_SLIDES[customer.plan];if(!plan){alert('\u672a\u627e\u5230\u65b9\u6848\u6570\u636e');return;}
    var pptx=new PptxGenJS();
    pptx.author='QuickBI \u5ba2\u6237\u589e\u8d2d\u63a8\u8350\u5de5\u5177';
    pptx.subject=customer.name+' - \u65b9\u6848'+customer.plan;
    pptx.defineLayout({name:'CUSTOM',w:PPT.W,h:PPT.H});
    pptx.layout='CUSTOM';
    pptCover(pptx,customer,plan);
    plan.slides.forEach(function(s){
      switch(s.type){
        case 'stages':pptStages(pptx,s,customer,plan);break;
        case 'diagnosis':pptDiagnosis(pptx,s,customer,plan);break;
        case 'cardGrid':pptCardGrid(pptx,s,customer,plan);break;
        case 'painTable':pptPainTable(pptx,s,customer,plan);break;
        case 'beforeAfter':pptBeforeAfter(pptx,s,customer,plan);break;
        case 'metrics':pptMetrics(pptx,s,customer,plan);break;
        case 'landing':pptLanding(pptx,s,customer,plan);break;
        case 'cases':pptCases(pptx,s,customer,plan);break;
      }
    });
    pptClosing(pptx,customer,plan);
    var fn='QuickBI\u589e\u8d2d\u65b9\u6848_'+customer.name.replace(/[\/\\:*?"<>|]/g,'_')+'_\u65b9\u6848'+customer.plan+'.pptx';
    pptx.writeFile({fileName:fn}).then(function(){
      if(btn){btn.classList.remove('generating');btn.classList.add('done');btn.textContent='\u2713 \u5df2\u4e0b\u8f7d';
        setTimeout(function(){btn.classList.remove('done');btn.textContent='\u2b07 \u4e0b\u8f7dPPT';},2500);}
    }).catch(function(e){
      alert('\u4e0b\u8f7d\u5931\u8d25: '+e.message);
      if(btn){btn.classList.remove('generating');btn.textContent='\u2b07 \u4e0b\u8f7dPPT';}
    });
  }catch(e){
    alert('\u751f\u6210\u5931\u8d25: '+e.message);
    if(btn){btn.classList.remove('generating');btn.textContent='\u2b07 \u4e0b\u8f7dPPT';}
  }
}

function copyPoints(btn){
  const c=allData.customers[selected];
  if(!c)return;
  const planNames={A:'AI数字员工',B:'AI基础提效',C:'深度场景加速'};
  let text=`【${c.name}】推荐方案${c.plan}: ${planNames[c.plan]}\n\n`;
  text+=`推荐理由: ${c.planReason}\n\n沟通要点:\n`;
  (c.talkingPoints||[]).forEach((t,i)=>{text+=`${i+1}. ${t}\n\n`});
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='已复制!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制沟通要点';btn.classList.remove('copied')},2000);
  });
}
